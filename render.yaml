services:
  # ----------------------------------------
  # Backend: PocketBase
  # ----------------------------------------
  - type: web
    name: qurbani-backend
    env: docker
    dockerContext: code/pocketbase
    dockerfilePath: code/pocketbase/Dockerfile
    plan: free # Using free tier for demo
    region: frankfurt # Pick a region close to your users
    envVars:
      # Optional: any internal PB vars if needed

  # ----------------------------------------
  # Frontend: Next.js App
  # ----------------------------------------
  - type: web
    name: qurbani-frontend
    env: node
    rootDir: code/apps/web
    buildCommand: npm install --legacy-peer-deps && npm run build
    startCommand: npm run start
    plan: free # Frontend can run on the free tier if desired
    region: frankfurt # Match the backend region
    envVars:
      # Render automatically provides an internal URL for services in the same environment.
      # We use this so server actions (Node) talk directly to PB without hitting the public internet.
      - key: PB_HOST
        fromService:
          type: web
          name: qurbani-backend
          property: host
      - key: POCKETBASE_INTERNAL_URL
        value: "http://qurbani-backend:8090"
      - key: NEXT_PUBLIC_POCKETBASE_URL
        value: "https://${PB_HOST}"
